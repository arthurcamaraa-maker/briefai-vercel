<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BriefAI</title>
  <style>
    :root {
      --bg: #f6f3f1;
      --card: #ffffff;
      --text: #1f1a17;
      --muted: #746b66;
      --line: #e6dfda;
      --brand: #e8340a;
      --brand-2: #ff6b3d;
      --ok: #106b39;
      --ok-bg: #e8f6ee;
      --err: #8a1c1c;
      --err-bg: #fdeeee;
      --shadow: 0 10px 30px rgba(31, 26, 23, 0.06);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
    }

    .wrap {
      width: 100%;
      max-width: 860px;
      margin: 0 auto;
      padding: 28px 18px 56px;
    }

    .hero {
      margin-bottom: 18px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--brand);
      background: rgba(232, 52, 10, 0.08);
      padding: 8px 10px;
      border-radius: 999px;
    }

    h1 {
      margin: 14px 0 8px;
      font-size: 34px;
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      max-width: 720px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .progress {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(8px);
      background: rgba(246, 243, 241, 0.88);
      padding: 14px 0 18px;
      margin-bottom: 16px;
    }

    .progress-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .step-dot {
      height: 10px;
      border-radius: 999px;
      background: #ddd5cf;
      flex: 1;
      transition: .2s ease;
    }

    .step-dot.active {
      background: linear-gradient(90deg, var(--brand), var(--brand-2));
    }

    .step-labels {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-top: 10px;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .panel {
      padding: 22px;
    }

    .section-title {
      margin: 0 0 6px;
      font-size: 22px;
      letter-spacing: -0.02em;
    }

    .section-desc {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 13px;
      font-weight: 700;
      color: #342c28;
    }

    .hint {
      font-weight: 500;
      color: var(--muted);
      font-size: 12px;
      margin-left: 6px;
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 14px;
      padding: 12px 14px;
      font: inherit;
      transition: border-color .15s ease, box-shadow .15s ease;
      outline: none;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    input:focus, textarea:focus, select:focus, button:focus-visible {
      border-color: rgba(232, 52, 10, .55);
      box-shadow: 0 0 0 4px rgba(232, 52, 10, .12);
      outline: none;
    }

    .pill-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .pill {
      appearance: none;
      border: 1px solid var(--line);
      background: #fff;
      color: #3b322d;
      padding: 10px 14px;
      border-radius: 999px;
      cursor: pointer;
      font: inherit;
      transition: .15s ease;
    }

    .pill.on {
      border-color: rgba(232, 52, 10, .28);
      background: rgba(232, 52, 10, .08);
      color: var(--brand);
      font-weight: 700;
    }

    .footer-actions {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 22px;
    }

    .btn {
      appearance: none;
      border: 0;
      border-radius: 14px;
      padding: 12px 18px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform .08s ease, opacity .15s ease, background .15s ease;
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn.secondary {
      background: #efe9e4;
      color: #3d332e;
    }

    .btn.primary {
      background: linear-gradient(90deg, var(--brand), var(--brand-2));
      color: white;
    }

    .btn.ghost {
      background: transparent;
      color: var(--brand);
      border: 1px solid rgba(232, 52, 10, .18);
    }

    .btn[disabled] {
      opacity: .55;
      cursor: not-allowed;
    }

    .status {
      margin: 14px 0 0;
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 14px;
      display: none;
    }

    .status.show { display: block; }
    .status.error {
      background: var(--err-bg);
      color: var(--err);
      border: 1px solid rgba(138, 28, 28, 0.12);
    }

    .status.success {
      background: var(--ok-bg);
      color: var(--ok);
      border: 1px solid rgba(16, 107, 57, 0.12);
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .tab {
      appearance: none;
      border: 1px solid var(--line);
      background: #fff;
      color: #3b322d;
      padding: 10px 14px;
      border-radius: 999px;
      font: inherit;
      cursor: pointer;
    }

    .tab.active {
      background: rgba(232, 52, 10, .08);
      color: var(--brand);
      border-color: rgba(232, 52, 10, .22);
      font-weight: 700;
    }

    .output-grid {
      display: grid;
      gap: 14px;
    }

    .out-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px;
      background: #fff;
    }

    .out-card h3 {
      margin: 0 0 10px;
      font-size: 15px;
      color: #2f2723;
    }

    .out-card p {
      margin: 0;
      white-space: pre-wrap;
      color: #4a403a;
      font-size: 14px;
    }

    .output-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 0 0 16px;
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
    }

    .counter {
      font-size: 12px;
      color: var(--muted);
      text-align: right;
      margin-top: 6px;
    }

    @media (max-width: 740px) {
      .grid { grid-template-columns: 1fr; }
      .step-labels { display: none; }
      h1 { font-size: 28px; }
      .panel { padding: 18px; }
      .footer-actions { flex-direction: column-reverse; }
      .footer-actions .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="eyebrow">BriefAI · Operações</div>
      <h1>Transforme briefing em entregáveis claros</h1>
      <p class="sub">
        Preencha o formulário para traduzir as informações recebidas em direcionamentos operacionais
        para resumo executivo e mídia.
      </p>
    </div>

    <div class="progress">
      <div class="progress-row" id="progressRow"></div>
      <div class="step-labels">
        <span>Cliente</span>
        <span>Público-alvo</span>
        <span>Campanha</span>
        <span>Contexto criativo</span>
        <span>Verba & timing</span>
      </div>
    </div>

    <div id="app"></div>
  </div>

  <script>
    const STEPS = [
      { key: 'cliente', label: 'Cliente' },
      { key: 'publico', label: 'Público-alvo' },
      { key: 'campanha', label: 'Campanha' },
      { key: 'contexto', label: 'Contexto criativo' },
      { key: 'verba', label: 'Verba & timing' }
    ];

    const OUTPUT_TABS = [
      { key: 'exec', label: 'Resumo Executivo' },
      { key: 'midia', label: 'Mídia' }
    ];

    const CAMPAIGN_OBJECTIVES = [
      'Awareness',
      'Tráfego',
      'Engajamento',
      'Leads',
      'Vendas',
      'Conversão'
    ];

    const PLATFORM_OPTIONS = [
      'Meta Ads',
      'Google Ads',
      'TikTok Ads',
      'YouTube',
      'LinkedIn Ads',
      'Programática'
    ];

    const FORMAT_OPTIONS = [
      'Imagem',
      'Vídeo',
      'Carrossel',
      'Stories',
      'Reels',
      'Search',
      'Display',
      'Landing Page'
    ];

    const state = {
      step: 0,
      loading: false,
      activeTab: 'exec',
      output: null,
      status: { type: '', text: '' },
      form: {
        clienteNome: '',
        clienteSegmento: '',
        clienteProduto: '',
        clienteSite: '',
        clienteRedes: '',

        publicoIdade: '',
        publicoGenero: '',
        publicoInteresses: '',
        publicoPersona: '',
        publicoLocalizacao: '',

        campanhaNome: '',
        campanhaDescricao: '',
        campanhaMensagem: '',
        campanhaOferta: '',
        campanhaProblemas: '',
        campanhaExpectativa: '',
        campanhaObjetivos: [],
        campanhaKPIs: '',

        contextoTom: '',
        contextoReferencias: '',
        contextoRestricoes: '',
        contextoMateriais: '',
        plataformas: [],
        formatos: [],

        verba: '',
        periodo: '',
        prazo: '',
        observacoes: ''
      }
    };

    function escapeHtml(str) {
      return String(str || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function saveForm() {
      localStorage.setItem('briefai-form', JSON.stringify(state.form));
    }

    function loadForm() {
      const raw = localStorage.getItem('briefai-form');
      if (!raw) return;
      try {
        const parsed = JSON.parse(raw);
        state.form = { ...state.form, ...parsed };
      } catch (_) {}
    }

    function setStatus(type, text) {
      state.status = { type, text };
      render();
    }

    function clearStatus() {
      state.status = { type: '', text: '' };
    }

    function setField(key, value) {
      state.form[key] = value;
      saveForm();
    }

    function toggleInArray(key, value) {
      const current = Array.isArray(state.form[key]) ? state.form[key] : [];
      state.form[key] = current.includes(value)
        ? current.filter(item => item !== value)
        : [...current, value];
      saveForm();
      render();
    }

    function updateProgress() {
      const el = document.getElementById('progressRow');
      if (!el) return;
      el.innerHTML = STEPS.map((_, i) =>
        `<div class="step-dot ${i <= state.step ? 'active' : ''}"></div>`
      ).join('');
    }

    function countCampaignChars() {
      return (state.form.campanhaDescricao || '').trim().length;
    }

    function validateStep(index = state.step) {
      const f = state.form;

      if (index === 0) {
        if (!f.clienteNome.trim()) return 'Preencha o nome do cliente.';
        if (!f.clienteSegmento.trim()) return 'Preencha o segmento.';
        if (!f.clienteProduto.trim()) return 'Preencha o produto ou serviço.';
      }

      if (index === 1) {
        if (!f.publicoIdade.trim()) return 'Preencha a idade ou faixa etária.';
        if (!f.publicoInteresses.trim()) return 'Preencha interesses/comportamentos.';
        if (!f.publicoLocalizacao.trim()) return 'Preencha cidade e estado.';
      }

      if (index === 2) {
        if (!f.campanhaNome.trim()) return 'Preencha o nome da campanha.';
        if (countCampaignChars() < 300) return 'A descrição da campanha deve ter pelo menos 300 caracteres.';
        if (!f.campanhaMensagem.trim()) return 'Preencha o que exatamente será comunicado.';
        if (!f.campanhaExpectativa.trim()) return 'Preencha o que você espera receber no final deste briefing.';
      }

      if (index === 3) {
        if (!f.contextoTom.trim()) return 'Preencha o tom da comunicação.';
      }

      if (index === 4) {
        if (!f.verba.trim()) return 'Preencha a verba.';
        if (!f.prazo.trim()) return 'Preencha o prazo.';
      }

      return '';
    }

    function nextStep() {
      const error = validateStep();
      if (error) {
        setStatus('error', error);
        return;
      }
      clearStatus();
      if (state.step < STEPS.length - 1) {
        state.step += 1;
        render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    function prevStep() {
      clearStatus();
      if (state.step > 0) {
        state.step -= 1;
        render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    function editBriefing() {
      state.output = null;
      state.activeTab = 'exec';
      state.step = 0;
      clearStatus();
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetForm() {
      localStorage.removeItem('briefai-form');
      state.form = {
        clienteNome: '',
        clienteSegmento: '',
        clienteProduto: '',
        clienteSite: '',
        clienteRedes: '',

        publicoIdade: '',
        publicoGenero: '',
        publicoInteresses: '',
        publicoPersona: '',
        publicoLocalizacao: '',

        campanhaNome: '',
        campanhaDescricao: '',
        campanhaMensagem: '',
        campanhaOferta: '',
        campanhaProblemas: '',
        campanhaExpectativa: '',
        campanhaObjetivos: [],
        campanhaKPIs: '',

        contextoTom: '',
        contextoReferencias: '',
        contextoRestricoes: '',
        contextoMateriais: '',
        plataformas: [],
        formatos: [],

        verba: '',
        periodo: '',
        prazo: '',
        observacoes: ''
      };
      state.output = null;
      state.step = 0;
      state.activeTab = 'exec';
      clearStatus();
      render();
    }

    function pillsHTML(key, options) {
      return options.map(option => {
        const active = Array.isArray(state.form[key]) && state.form[key].includes(option);
        return `
          <button
            type="button"
            class="pill ${active ? 'on' : ''}"
            aria-pressed="${active}"
            onclick="toggleInArray('${key}', '${escapeHtml(option)}')"
          >
            ${escapeHtml(option)}
          </button>
        `;
      }).join('');
    }

    function fieldInput(id, label, placeholder, value, extra = '') {
      return `
        <div class="field ${extra}">
          <label for="${id}">${label}</label>
          <input
            id="${id}"
            type="text"
            placeholder="${escapeHtml(placeholder)}"
            value="${escapeHtml(value || '')}"
            oninput="setField('${id}', this.value)"
          />
        </div>
      `;
    }

    function fieldTextarea(id, label, placeholder, value, extra = '', minChars = null) {
      const counter = minChars !== null
        ? `<div class="counter">${(value || '').trim().length}/${minChars} caracteres mínimos</div>`
        : '';
      return `
        <div class="field ${extra}">
          <label for="${id}">${label}</label>
          <textarea
            id="${id}"
            placeholder="${escapeHtml(placeholder)}"
            oninput="setField('${id}', this.value); renderCampaignCounterSafe()"
          >${escapeHtml(value || '')}</textarea>
          ${counter}
        </div>
      `;
    }

    function renderCampaignCounterSafe() {
      const counter = document.querySelector('#campaignCounter');
      if (counter) {
        counter.textContent = `${countCampaignChars()}/300 caracteres mínimos`;
      }
    }

    function renderStep() {
      const f = state.form;

      if (state.step === 0) {
        return `
          <div class="card panel">
            <h2 class="section-title">Cliente</h2>
            <p class="section-desc">Contexto base da marca, produto e presença digital.</p>

            <div class="grid">
              ${fieldInput('clienteNome', 'Nome do cliente', 'Ex: Ligga Telecom', f.clienteNome)}
              ${fieldInput('clienteSegmento', 'Segmento', 'Ex: Telecom', f.clienteSegmento)}
              ${fieldInput('clienteProduto', 'Produto / serviço', 'Ex: Internet fibra para empresas', f.clienteProduto, 'full')}
              ${fieldInput('clienteSite', 'Site', 'Ex: https://www.marca.com.br', f.clienteSite)}
              ${fieldInput('clienteRedes', 'Redes sociais', 'Ex: Instagram, LinkedIn, TikTok ou links', f.clienteRedes)}
            </div>

            ${renderFooter()}
          </div>
        `;
      }

      if (state.step === 1) {
        return `
          <div class="card panel">
            <h2 class="section-title">Público-alvo</h2>
            <p class="section-desc">Detalhes operacionais do público que a campanha pretende atingir.</p>

            <div class="grid">
              ${fieldInput('publicoIdade', 'Idade / faixa etária', 'Ex: 25 a 45 anos', f.publicoIdade)}
              ${fieldInput('publicoGenero', 'Gênero', 'Ex: Todos / Feminino / Masculino', f.publicoGenero)}
              ${fieldInput('publicoLocalizacao', 'Cidade / Estado', 'Ex: Curitiba - PR', f.publicoLocalizacao)}
              ${fieldInput('publicoPersona', 'Persona', 'Ex: gestor de TI de empresa média', f.publicoPersona, 'full')}
              ${fieldTextarea('publicoInteresses', 'Interesses / comportamentos', 'Descreva comportamentos, dores, contextos de consumo ou afinidades.', f.publicoInteresses, 'full')}
            </div>

            ${renderFooter()}
          </div>
        `;
      }

      if (state.step === 2) {
        return `
          <div class="card panel">
            <h2 class="section-title">Campanha</h2>
            <p class="section-desc">Transforme a campanha em informação útil para execução, evitando lacunas.</p>

            <div class="grid">
              ${fieldInput('campanhaNome', 'Nome da campanha', 'Ex: Mês do Empresário', f.campanhaNome)}
              ${fieldInput('campanhaOferta', 'Existe oferta ativa?', 'Ex: 20% off / frete grátis / sem oferta', f.campanhaOferta)}
              <div class="field full">
                <label>Objetivos da campanha</label>
                <div class="pill-wrap">${pillsHTML('campanhaObjetivos', CAMPAIGN_OBJECTIVES)}</div>
              </div>
              ${fieldTextarea('campanhaMensagem', 'O que exatamente será comunicado?', 'Explique a mensagem central que precisa aparecer na campanha.', f.campanhaMensagem, 'full')}
              <div class="field full">
                <label for="campanhaDescricao">
                  Descrição da campanha
                  <span class="hint">mínimo de 300 caracteres</span>
                </label>
                <textarea
                  id="campanhaDescricao"
                  placeholder="Descreva o contexto da campanha com detalhes suficientes para orientar a execução."
                  oninput="setField('campanhaDescricao', this.value); renderCampaignCounterSafe()"
                >${escapeHtml(f.campanhaDescricao || '')}</textarea>
                <div class="counter" id="campaignCounter">${countCampaignChars()}/300 caracteres mínimos</div>
              </div>
              ${fieldTextarea('campanhaProblemas', 'Problemas passados que devemos evitar?', 'Ex: criativos muito institucionais, excesso de texto, segmentação ampla demais, promessa confusa.', f.campanhaProblemas, 'full')}
              ${fieldTextarea('campanhaExpectativa', 'O que você espera receber no final deste briefing?', 'Ex: lista de criativos, plano de mídia, calendário, estrutura de campanha.', f.campanhaExpectativa, 'full')}
              ${fieldInput('campanhaKPIs', 'KPIs desejados', 'Ex: CPL, CTR, Leads, CAC', f.campanhaKPIs, 'full')}
            </div>

            ${renderFooter()}
          </div>
        `;
      }

      if (state.step === 3) {
        return `
          <div class="card panel">
            <h2 class="section-title">Contexto criativo</h2>
            <p class="section-desc">Diretrizes de linguagem, formatos e insumos já existentes.</p>

            <div class="grid">
              ${fieldInput('contextoTom', 'Tom da comunicação', 'Ex: direto, promocional, técnico, premium', f.contextoTom)}
              ${fieldTextarea('contextoRestricoes', 'Restrições', 'Ex: não usar comparação com concorrentes, evitar tom apelativo, restrição legal.', f.contextoRestricoes)}
              <div class="field full">
                <label>Plataformas selecionadas</label>
                <div class="pill-wrap">${pillsHTML('plataformas', PLATFORM_OPTIONS)}</div>
              </div>
              <div class="field full">
                <label>Formatos selecionados</label>
                <div class="pill-wrap">${pillsHTML('formatos', FORMAT_OPTIONS)}</div>
              </div>
              ${fieldTextarea('contextoReferencias', 'Referências', 'Links, campanhas, marcas ou direções que ajudam a orientar a execução.', f.contextoReferencias, 'full')}
              ${fieldTextarea('contextoMateriais', 'Existe material já pronto?', 'Cole links com conteúdo hospedado: Google Drive, Dropbox, Figma, pasta de imagens, vídeos, etc.', f.contextoMateriais, 'full')}
            </div>

            ${renderFooter()}
          </div>
        `;
      }

      return `
        <div class="card panel">
          <h2 class="section-title">Verba & timing</h2>
          <p class="section-desc">Informações de investimento, janela da campanha e prazos internos.</p>

          <div class="grid">
            ${fieldInput('verba', 'Verba', 'Ex: R$ 30.000', f.verba)}
            ${fieldInput('periodo', 'Período', 'Ex: Abril a Junho', f.periodo)}
            ${fieldInput('prazo', 'Prazo', 'Ex: Criativos até 12/04', f.prazo)}
            ${fieldTextarea('observacoes', 'Observações adicionais', 'Tudo que pode complementar a execução e evitar retrabalho.', f.observacoes, 'full')}
          </div>

          ${renderFooter(true)}
        </div>
      `;
    }

    function renderFooter(isLast = false) {
      return `
        <div class="footer-actions">
          <div>
            ${state.step > 0 ? `<button class="btn secondary" type="button" onclick="prevStep()">Voltar</button>` : `<button class="btn secondary" type="button" onclick="resetForm()">Limpar tudo</button>`}
          </div>
          <div style="display:flex; gap:10px; flex-wrap:wrap;">
            ${!isLast ? `<button class="btn primary" type="button" onclick="nextStep()">Continuar</button>` : `<button class="btn primary" type="button" onclick="generateBrief()" ${state.loading ? 'disabled' : ''}>${state.loading ? 'Gerando...' : 'Gerar briefing'}</button>`}
          </div>
        </div>
      `;
    }

    function validateResponse(data) {
      const required = ['exec', 'midia'];
      const missing = required.filter(key => !data[key] || typeof data[key] !== 'object');
      if (missing.length) {
        throw new Error(`A resposta da IA veio incompleta. Blocos ausentes: ${missing.join(', ')}`);
      }
      return true;
    }

    async function generateBrief() {
      const error = validateStep(4);
      if (error) {
        setStatus('error', error);
        return;
      }

      clearStatus();
      state.loading = true;
      render();

      try {
        const response = await fetch('/api/generate-brief', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(state.form)
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data?.error || 'Erro ao gerar briefing.');
        }

        validateResponse(data);

        state.output = data;
        state.activeTab = 'exec';
        setStatus('success', 'Briefing gerado com sucesso.');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } catch (err) {
        setStatus('error', err.message || 'Erro inesperado ao gerar briefing.');
      } finally {
        state.loading = false;
        render();
      }
    }

    function humanizeKey(str) {
      return String(str || '')
        .replaceAll('_', ' ')
        .replace(/\b\w/g, s => s.toUpperCase());
    }

    function setTab(key) {
      state.activeTab = key;
      renderOutputOnly();
    }

    async function copyText(text, successMessage = 'Conteúdo copiado.') {
      try {
        await navigator.clipboard.writeText(text);
        setStatus('success', successMessage);
      } catch (_) {
        setStatus('error', 'Não foi possível copiar o conteúdo.');
      }
    }

    function renderOutputOnly() {
      const root = document.getElementById('outputRoot');
      if (!root || !state.output) return;

      const section = state.output[state.activeTab] || {};
      const cards = Object.entries(section).map(([key, value]) => `
        <div class="out-card">
          <h3>${escapeHtml(humanizeKey(key))}</h3>
          <p>${escapeHtml(value || '')}</p>
        </div>
      `).join('');

      root.innerHTML = `
        <div class="tabs" role="tablist">
          ${OUTPUT_TABS.map(tab => `
            <button
              class="tab ${state.activeTab === tab.key ? 'active' : ''}"
              type="button"
              role="tab"
              aria-selected="${state.activeTab === tab.key}"
              onclick="setTab('${tab.key}')"
            >
              ${escapeHtml(tab.label)}
            </button>
          `).join('')}
        </div>

        <div class="output-actions">
          <button class="btn ghost" type="button" onclick='copyText(JSON.stringify(state.output, null, 2), "JSON completo copiado.")'>Copiar JSON</button>
          <button class="btn ghost" type="button" onclick='copyText(Object.entries(state.output[state.activeTab] || {}).map(([k,v]) => `${humanizeKey(k)}\\n${v}\\n`).join("\\n"), "Seção copiada.")'>Copiar seção</button>
          <button class="btn secondary" type="button" onclick="editBriefing()">Editar briefing</button>
        </div>

        <div class="output-grid">
          ${cards}
        </div>
      `;
    }

    function renderOutput() {
      return `
        <div class="card panel">
          <h2 class="section-title">Entregáveis gerados</h2>
          <p class="section-desc">Saída operacional estruturada com base no briefing preenchido.</p>
          <div id="outputRoot"></div>
        </div>
      `;
    }

    function render() {
      const app = document.getElementById('app');
      if (!app) return;

      const statusHtml = `
        <div class="status ${state.status.text ? 'show' : ''} ${state.status.type}">
          ${escapeHtml(state.status.text)}
        </div>
      `;

      if (state.output) {
        app.innerHTML = statusHtml + renderOutput();
        updateProgress();
        renderOutputOnly();
        return;
      }

      app.innerHTML = statusHtml + renderStep();
      updateProgress();
      renderCampaignCounterSafe();
    }

    loadForm();
    render();

    window.setField = setField;
    window.toggleInArray = toggleInArray;
    window.nextStep = nextStep;
    window.prevStep = prevStep;
    window.generateBrief = generateBrief;
    window.resetForm = resetForm;
    window.setTab = setTab;
    window.editBriefing = editBriefing;
    window.copyText = copyText;
    window.renderCampaignCounterSafe = renderCampaignCounterSafe;
    window.humanizeKey = humanizeKey;
  </script>
</body>
</html>
