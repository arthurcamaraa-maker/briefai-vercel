<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>BriefAI</title>
  <style>
    body { font-family: Arial; max-width: 800px; margin: 40px auto; }
    input, textarea { width: 100%; margin: 8px 0; padding: 8px; }
    button { padding: 10px 20px; }
  </style>
</head>
<body>

<h2>Cliente</h2>
<input id="clienteNome" placeholder="Nome do cliente" />
<input id="clienteSegmento" placeholder="Segmento" />
<input id="clienteProduto" placeholder="Produto" />
<input id="clienteSite" placeholder="Site" />
<input id="clienteRedes" placeholder="Redes sociais" />

<h2>Público</h2>
<input id="publicoIdade" placeholder="Idade" />
<input id="publicoGenero" placeholder="Gênero" />
<input id="publicoInteresses" placeholder="Interesses" />
<input id="publicoLocalizacao" placeholder="Cidade / Estado" />

<h2>Campanha</h2>
<input id="campanhaNome" placeholder="Nome da campanha" />
<textarea id="campanhaDescricao" placeholder="Descrição (mín 300 caracteres)"></textarea>
<textarea id="campanhaMensagem" placeholder="O que será comunicado"></textarea>
<input id="campanhaOferta" placeholder="Oferta ativa" />
<textarea id="campanhaProblemas" placeholder="Problemas passados a evitar"></textarea>
<textarea id="campanhaExpectativa" placeholder="O que você espera receber (ex: criativos, plano de mídia, calendário)"></textarea>

<h2>Contexto Criativo</h2>
<input id="contextoTom" placeholder="Tom" />
<textarea id="contextoReferencias" placeholder="Referências"></textarea>
<textarea id="contextoRestricoes" placeholder="Restrições"></textarea>
<textarea id="contextoMateriais" placeholder="Links de materiais existentes (Drive, Dropbox, etc)"></textarea>

<h2>Verba & Timing</h2>
<input id="verba" placeholder="Verba" />
<input id="periodo" placeholder="Período" />
<input id="prazo" placeholder="Prazo" />

<button onclick="gerar()">Gerar briefing</button>

<pre id="output"></pre>

<script>
async function gerar() {
  const body = {
    clienteNome: v('clienteNome'),
    clienteSegmento: v('clienteSegmento'),
    clienteProduto: v('clienteProduto'),
    clienteSite: v('clienteSite'),
    clienteRedes: v('clienteRedes'),

    publicoIdade: v('publicoIdade'),
    publicoGenero: v('publicoGenero'),
    publicoInteresses: v('publicoInteresses'),
    publicoLocalizacao: v('publicoLocalizacao'),

    campanhaNome: v('campanhaNome'),
    campanhaDescricao: v('campanhaDescricao'),
    campanhaMensagem: v('campanhaMensagem'),
    campanhaOferta: v('campanhaOferta'),
    campanhaProblemas: v('campanhaProblemas'),
    campanhaExpectativa: v('campanhaExpectativa'),

    contextoTom: v('contextoTom'),
    contextoReferencias: v('contextoReferencias'),
    contextoRestricoes: v('contextoRestricoes'),
    contextoMateriais: v('contextoMateriais'),

    verba: v('verba'),
    periodo: v('periodo'),
    prazo: v('prazo')
  };

  const res = await fetch('/api/generate-brief', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  const data = await res.json();
  document.getElementById('output').innerText = JSON.stringify(data, null, 2);
}

function v(id) { return document.getElementById(id).value }
</script>

</body>
</html>
